name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  build:
    runs-on: windows-latest  # реальная Windows-среда

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install plotext termcolor pyinstaller

    - name: Build EXE
      run: |
        cd modular-code
        pyinstaller --onefile --console --hidden-import=plotext --hidden-import=termcolor main.py

    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ballistics-calc
        path: modular-code/dist/main.exe
